<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_name }} — Agents Dashboard</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/board.css">
    <link rel="stylesheet" href="/static/css/dialog.css">
    <link rel="stylesheet" href="/static/css/file-browser.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css">
</head>
<body>
    <header class="top-bar">
        <h1 class="project-title">{{ project_name }} ({{ current_branch }})</h1>

        <!-- Stats Display -->
        <div class="stats-bar" id="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Cost:</span>
                <span class="stat-value" id="total-cost">$0.00</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Tokens:</span>
                <span class="stat-value" id="total-tokens">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Messages:</span>
                <span class="stat-value" id="total-messages">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Tools:</span>
                <span class="stat-value" id="tool-calls">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Active:</span>
                <span class="stat-value" id="active-agents">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Today:</span>
                <span class="stat-value" id="completed-today">0</span>
            </div>
        </div>

        <div class="top-bar-actions">
            <button id="search-btn" class="btn btn-icon" onclick="SearchDialog.open()" title="Search items">🔍</button>
            <button id="files-btn" class="btn btn-secondary btn-sm" onclick="FileBrowser.open()">Files</button>
            <button id="notifications-btn" class="btn btn-icon" title="System notifications">
                <span class="bell-icon">&#x1F514;</span>
                <span class="notification-badge" id="notification-badge" style="display:none">0</span>
            </button>
            <button id="config-btn" class="btn btn-icon" title="Agent config">⚙</button>
            <button id="sound-toggle" class="btn btn-icon" title="Sound on (click to mute)">
                <span class="sound-on">🔊</span>
                <span class="sound-off" style="display:none">🔇</span>
            </button>
            <button id="theme-toggle" class="btn btn-icon" title="Toggle theme">
                <span class="theme-icon-light">☀</span>
                <span class="theme-icon-dark">☾</span>
            </button>
        </div>
    </header>

    {% block content %}{% endblock %}

    <!-- Shortcuts Bar -->
    <div class="shortcuts-bar" id="shortcuts-bar" style="display:none">
        <div class="shortcuts-buttons"></div>
        <div class="shortcuts-actions">
            <button class="shortcut-action-btn" onclick="Shortcuts.showAddDialog()" title="Add shortcut">+</button>
            <button class="shortcut-action-btn" onclick="Shortcuts.showManageDialog()" title="Manage shortcuts">⚙</button>
        </div>
    </div>

    <!-- Shortcuts — always-visible add button when bar is hidden -->
    <button class="shortcuts-add-floating" id="shortcuts-add-floating" onclick="Shortcuts.showAddDialog()" title="Add a shortcut">+ Shortcut</button>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: false, theme: document.documentElement.dataset.theme === 'light' ? 'default' : 'dark' });</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/sound.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/diff.js"></script>
    <script src="/static/js/annotate.js"></script>

    <!-- Dialog modules - load in dependency order -->
    <script src="/static/js/dialog-core.js"></script>
    <script src="/static/js/dialog-utils.js"></script>
    <script src="/static/js/attachments.js"></script>
    <script src="/static/js/item-dialog.js"></script>
    <script src="/static/js/detail-dialog.js"></script>
    <script src="/static/js/review-dialog.js"></script>
    <script src="/static/js/clarification-dialog.js"></script>
    <script src="/static/js/request-changes-dialog.js"></script>
    <script src="/static/js/config-dialog.js"></script>
    <script src="/static/js/annotation-canvas.js"></script>

    <script src="/static/js/notification-dialog.js"></script>

    <!-- Main dialog coordinator - loads after all modules -->
    <script src="/static/js/dialogs.js"></script>
    <script src="/static/js/file-browser.js"></script>
    <script src="/static/js/search-dialog.js"></script>
    <script src="/static/js/shortcuts.js"></script>
    <script src="/static/js/stats.js"></script>
    <script src="/static/js/board.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
